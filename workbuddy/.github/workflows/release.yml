name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag without v (e.g. 0.4.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
          - goos: linux
            goarch: amd64
            cc: x86_64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Install cross C toolchain
        run: |
          sudo apt-get update
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          else
            sudo apt-get install -y gcc-x86-64-linux-gnu || sudo apt-get install -y gcc-multilib
          fi
      - name: Test
        run: |
          export PATH="/usr/local/go/bin:$PATH"
          go test ./...
          go vet ./...
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          CGO_ENABLED: "1"
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then VERSION="${GITHUB_REF_NAME#v}"; fi
          mkdir -p dist
          go build -trimpath -buildmode=c-shared \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/workbuddy_${GOOS}_${GOARCH}.so" .
          rm -f dist/*.h
      - uses: actions/upload-artifact@v4
        with:
          name: workbuddy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.so

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
